apiVersion: apps/v1
kind: Deployment
metadata:
  name: queue-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: queue-service
  template:
    metadata:
      labels:
        app: queue-service
    spec:
      containers:
      - name: queue-service
        image: joashsharon/queue-service:latest
        ports:
        - containerPort: 5003
        env:
        - name: MONGO_URI
          value: "mongodb://mongo-queue:27017/queueDb"
        livenessProbe:
          httpGet:
            path: /health
            port: 5003
          initialDelaySeconds: 15
          periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: queue-service
spec:
  selector:
    app: queue-service
  ports:
  - protocol: TCP
    port: 5003
    targetPort: 5003
