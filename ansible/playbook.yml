---
- name: Setup Local Environment for Patient Appointment System
  hosts: localhost
  connection: local
  become: yes
  tasks:
    - name: Ensure Docker is installed (APT/Debian/Ubuntu)
      apt:
        name: docker.io
        state: present
        update_cache: yes
      ignore_errors: yes

    - name: Ensure Docker service is running
      service:
        name: docker
        state: started
        enabled: yes
      ignore_errors: yes

    - name: Download Minikube
      get_url:
        url: https://storage.googleapis.com/minikube/releases/latest/minikube-linux-amd64
        dest: /usr/local/bin/minikube
        mode: '0755'
      ignore_errors: yes

    - name: Download Kubectl
      get_url:
        url: "https://dl.k8s.io/release/v1.28.0/bin/linux/amd64/kubectl"
        dest: /usr/local/bin/kubectl
        mode: '0755'
      ignore_errors: yes

    - name: Display Setup completion
      debug:
        msg: "Docker, Minikube, and Kubectl are installed. Please run 'terraform apply' to bootstrap the cluster."
